# Perfil exclusivo para testes de integracao. A trava de inicializacao recusa
# qualquer banco cujo nome nao termine em _test.
spring.datasource.url=${TEST_DB_URL:jdbc:postgresql://localhost:5432/poprc_test}
spring.datasource.username=${TEST_DB_USERNAME:${DB_USERNAME:postgres}}
spring.datasource.password=${TEST_DB_PASSWORD:${DB_PASSWORD:}}

spring.flyway.locations=classpath:db/migration
spring.jpa.show-sql=false
spring.task.scheduling.enabled=false
