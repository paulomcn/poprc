spring.application.name=demo

# Permite configuração local sem versionar credenciais. Variáveis de ambiente
# continuam tendo precedência sobre o arquivo opcional.
spring.config.import=optional:file:./application-local.properties

server.port=${SERVER_PORT:8085}
server.address=${SERVER_ADDRESS:0.0.0.0}

# PostgreSQL datasource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/poprc}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway: bancos existentes recebem baseline V1; bancos vazios executam V1.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=Schema existente antes do Flyway
spring.flyway.validate-on-migrate=true

# Zoho Authentication
zoho.auth.client-id=${ZOHO_CLIENT_ID:nao-configurado}
zoho.auth.client-secret=${ZOHO_CLIENT_SECRET:nao-configurado}
zoho.auth.redirect-uri=${ZOHO_REDIRECT_URI:http://localhost:8085/callback}
zoho.auth.auth-url=https://accounts.zoho.com/oauth/v2/auth
zoho.auth.token-url=https://accounts.zoho.com/oauth/v2/token
zoho.auth.scope=ZohoCRM.modules.ALL
zoho.auth.account-id=${ZOHO_ACCOUNT_ID:nao-configurado}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:nao-configurado}
spring.mail.password=${MAIL_PASSWORD:nao-configurado}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Spring Security OAuth2 Client Configuration
spring.security.oauth2.client.registration.zoho.client-id=${ZOHO_CLIENT_ID:nao-configurado}
spring.security.oauth2.client.registration.zoho.client-secret=${ZOHO_CLIENT_SECRET:nao-configurado}
spring.security.oauth2.client.registration.zoho.client-name=Zoho
spring.security.oauth2.client.registration.zoho.scope=ZohoCRM.modules.ALL
spring.security.oauth2.client.registration.zoho.redirect-uri=http://localhost:8085/login/oauth2/code/zoho
spring.security.oauth2.client.registration.zoho.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.zoho.client-authentication-method=client_secret_post

# Spring Security OAuth2 Provider Configuration
spring.security.oauth2.client.provider.zoho.authorization-uri=https://accounts.zoho.com/oauth/v2/auth
spring.security.oauth2.client.provider.zoho.token-uri=https://accounts.zoho.com/oauth/v2/token
spring.security.oauth2.client.provider.zoho.user-info-uri=https://www.zohoapis.com/crm/v2/users?type=CurrentUser
spring.security.oauth2.client.provider.zoho.user-name-attribute=id

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
