# Perfil exclusivo para desenvolvimento local. O sufixo _dev evita que os
# scripts de manutenção operem acidentalmente sobre o banco principal.
spring.datasource.url=${DEV_DB_URL:jdbc:postgresql://localhost:5432/poprc_dev}
spring.datasource.username=${DEV_DB_USERNAME:${DB_USERNAME:postgres}}
spring.datasource.password=${DEV_DB_PASSWORD:${DB_PASSWORD:}}

spring.flyway.locations=classpath:db/migration,classpath:db/dev
spring.jpa.show-sql=false
